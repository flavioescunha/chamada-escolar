<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Chamada Escolar - Turma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 16px;
      margin-top: 20px;
      background: #fff;
    }

    input, button {
      padding: 10px;
      font-size: 15px;
      box-sizing: border-box;
      margin-top: 6px;
      margin-bottom: 12px;
      width: 100%;
    }

    button {
      cursor: pointer;
    }

    .linha {
      display: grid;
      grid-template-columns: 120px 1fr 160px;
      gap: 10px;
    }

    .aluno-item {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
      background: #fff;
    }

    .aluno-item.transferido {
      background: #eeeeee;
      border-color: #c8c8c8;
      color: #777;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .mensagem {
      margin-top: 10px;
      font-weight: bold;
    }

    .btn-secundario {
      background: #f2f2f2;
      border: 1px solid #bbb;
      width: auto;
      padding: 10px 16px;
    }

    .linha-mapa-config {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 10px;
      align-items: end;
    }

    #qtdFileiras,
    #qtdCarteiras {
      width: 5ch;
      min-width: 5ch;
      text-align: center;
      padding-left: 6px;
      padding-right: 6px;
    }

    .mapa-sem-posicao {
      min-height: 70px;
      border: 1px dashed #bbb;
      border-radius: 8px;
      padding: 10px;
      margin-top: 12px;
      margin-bottom: 16px;
      background: #fafafa;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mapa-grade {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .fileira-mapa {
      display: grid;
      gap: 8px;
    }

    .carteira-slot {
      min-height: 72px;
      border: 1px dashed #bbb;
      border-radius: 8px;
      background: #fafafa;
      padding: 6px;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .carteira-slot.destino-drag {
      border-color: #4a78c2;
      background: #eaf2ff;
      box-shadow:
        0 0 0 2px rgba(74, 120, 194, 0.18),
        0 0 10px rgba(74, 120, 194, 0.25);
    }

    .carteira-slot.destino-drag .card-mapa-aluno {
      border-color: #4a78c2;
      background: #f5f9ff;
      box-shadow: 0 0 10px rgba(74, 120, 194, 0.20);
    }

    .card-mapa-aluno {
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      width: 100%;
      cursor: grab;
      font-size: 14px;
      box-sizing: border-box;
    }

    .card-mapa-aluno.transferido {
      background: #eeeeee;
      border-color: #c8c8c8;
      color: #777;
    }

    .item-historico-mapa {
      border-bottom: 1px solid #eee;
      padding: 8px 0;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .linha {
        grid-template-columns: 1fr;
      }

      .linha-mapa-config {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="topo">
    <div>
      <h2>Turma</h2>
      <div id="infoTurma" class="muted">Carregando turma...</div>
      <div id="infoProfessor" class="muted">Carregando professor...</div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button id="btnIrChamada" class="btn-secundario">Ir para chamada</button>
      <button id="btnVoltar" class="btn-secundario">Voltar</button>
    </div>
  </div>

  <!-- LISTA DE ALUNOS PRIMEIRO -->
  <div class="card">
    <h3>Alunos da turma</h3>
    <div id="listaAlunos">Carregando...</div>
  </div>

  <!-- MAPA DA SALA -->
  <div class="card">
    <h3>Mapa da sala</h3>

    <div class="linha-mapa-config">
      <div>
        <label for="qtdFileiras">Fileiras</label>
        <input type="number" id="qtdFileiras" min="1" max="20" />
      </div>

      <div>
        <label for="qtdCarteiras">Carteiras por fileira</label>
        <input type="number" id="qtdCarteiras" min="1" max="20" />
      </div>

      <div style="display:flex; align-items:end; gap:8px; flex-wrap:wrap;">
        <button id="btnSalvarMapa" class="btn-secundario">Salvar mapa</button>
        <button id="btnReiniciarMapa" class="btn-secundario">Reiniciar mapa</button>
      </div>
    </div>

    <div id="msgMapa" class="mensagem"></div>

    <h4>Disposição da sala</h4>
    <div id="gradeMapaSala" class="mapa-grade"></div>

    <h4>Últimas 10 alterações</h4>
    <div id="listaHistoricoMapa" class="muted">Carregando...</div>
  </div>

  <!-- IMPORTAÇÃO NO MEIO -->
  <div class="card">
    <h3>Importar alunos da planilha</h3>

    <label for="arquivoPlanilha">Selecione o arquivo .xls ou .xlsx</label>
    <input type="file" id="arquivoPlanilha" accept=".xls,.xlsx" />

    <button id="btnImportarPlanilha">Importar planilha</button>

    <div class="muted">
      O sistema tentará localizar automaticamente as colunas Nº, Aluno e RM.
    </div>

    <div id="msgImportacao" class="mensagem"></div>
  </div>

  <!-- CADASTRO MANUAL POR ÚLTIMO -->
  <div class="card">
    <h3>Cadastrar aluno manualmente</h3>

    <div class="linha">
      <div>
        <label for="numeroAluno">Número</label>
        <input type="number" id="numeroAluno" placeholder="Ex.: 1" />
      </div>

      <div>
        <label for="nomeAluno">Nome do aluno</label>
        <input type="text" id="nomeAluno" placeholder="Ex.: João da Silva" />
      </div>

      <div>
        <label for="rmAluno">RM</label>
        <input type="text" id="rmAluno" placeholder="Ex.: 2549" />
      </div>
    </div>

    <button id="btnSalvarAluno">Salvar aluno</button>
    <div id="msgAluno" class="mensagem"></div>
  </div>

  <!-- Biblioteca para ler .xls e .xlsx -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { supabase } from "./js/supabase.js";

    const infoTurma = document.getElementById("infoTurma");
    const infoProfessor = document.getElementById("infoProfessor");
    const btnIrChamada = document.getElementById("btnIrChamada");
    const btnVoltar = document.getElementById("btnVoltar");

    const btnSalvarAluno = document.getElementById("btnSalvarAluno");
    const numeroAluno = document.getElementById("numeroAluno");
    const nomeAluno = document.getElementById("nomeAluno");
    const rmAluno = document.getElementById("rmAluno");
    const msgAluno = document.getElementById("msgAluno");
    const listaAlunos = document.getElementById("listaAlunos");

    const arquivoPlanilha = document.getElementById("arquivoPlanilha");
    const btnImportarPlanilha = document.getElementById("btnImportarPlanilha");
    const msgImportacao = document.getElementById("msgImportacao");

    const qtdFileiras = document.getElementById("qtdFileiras");
    const qtdCarteiras = document.getElementById("qtdCarteiras");

    const btnSalvarMapa = document.getElementById("btnSalvarMapa");
    const btnReiniciarMapa = document.getElementById("btnReiniciarMapa");
    const msgMapa = document.getElementById("msgMapa");
    const gradeMapaSala = document.getElementById("gradeMapaSala");
    const listaHistoricoMapa = document.getElementById("listaHistoricoMapa");

    let usuarioAtual = null;
    let professorAtual = null;
    let turmaAtual = null;

    let alunosTurmaAtual = [];
    let configMapaSala = null;
    let posicoesMapaSala = [];
    let alunoArrastandoId = null;

    function getTurmaIdDaUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    async function carregarSessao() {
      const { data, error } = await supabase.auth.getSession();

      if (error) {
        alert("Erro ao verificar sessão: " + error.message);
        return false;
      }

      const user = data.session?.user;

      if (!user) {
        window.location.href = "index.html";
        return false;
      }

      usuarioAtual = user;
      return true;
    }

    async function carregarProfessor() {
      const { data, error } = await supabase
        .from("professores")
        .select("id, nome, email, disciplina, exigir_troca_senha")
        .eq("id", usuarioAtual.id)
        .single();

      if (error) {
        alert("Professor não encontrado.");
        console.error(error);
        return false;
      }

      professorAtual = data;

      if (data.exigir_troca_senha === true) {
        window.location.href = "trocar-senha.html";
        return false;
      }

      infoProfessor.innerText = `Professor: ${data.nome} | Disciplina: ${data.disciplina || ""}`;
      return true;
    }

    async function carregarTurma() {
      const turmaId = getTurmaIdDaUrl();

      if (!turmaId) {
        alert("ID da turma não informado.");
        window.location.href = "turmas.html";
        return false;
      }

      const { data, error } = await supabase
        .from("turmas")
        .select("id, nome, periodo_padrao, criado_por")
        .eq("id", turmaId)
        .single();

      if (error) {
        alert("Turma não encontrada.");
        console.error(error);
        window.location.href = "turmas.html";
        return false;
      }

      turmaAtual = data;
      infoTurma.innerText = `Turma: ${data.nome} | Período padrão: ${data.periodo_padrao || "-"}`;
      return true;
    }

    async function carregarAlunos() {
      listaAlunos.innerHTML = "Carregando alunos...";

      const { data, error } = await supabase
        .from("alunos")
        .select("id, numero, nome, rm, transferido")
        .eq("turma_id", turmaAtual.id)
        .order("numero", { ascending: true });

      if (error) {
        console.error(error);
        listaAlunos.innerHTML = `<div class="mensagem">Erro ao carregar alunos: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        alunosTurmaAtual = [];
        listaAlunos.innerHTML = `<div class="muted">Nenhum aluno cadastrado ainda.</div>`;
        return;
      }

      alunosTurmaAtual = data || [];
      listaAlunos.innerHTML = "";

      data.forEach((aluno) => {
        const div = document.createElement("div");
        div.className = `aluno-item ${aluno.transferido ? "transferido" : ""}`;
        div.innerHTML = `
          <strong>Nº ${aluno.numero} - ${aluno.nome}</strong><br>
          <span class="muted">RM: ${aluno.rm || "-"}</span><br>
          ${aluno.transferido ? `<span class="muted">Aluno transferido/inativo</span>` : ""}
        `;
        listaAlunos.appendChild(div);
      });
    }

    async function carregarConfigMapaSala() {
      const { data, error } = await supabase
        .from("turma_mapa_config")
        .select("turma_id, fileiras, carteiras_por_fileira")
        .eq("turma_id", turmaAtual.id)
        .maybeSingle();

      if (error) {
        console.error("Erro ao carregar configuração do mapa:", error);
        msgMapa.innerText = "Erro ao carregar configuração do mapa: " + error.message;
        return;
      }

      configMapaSala = data || null;
      qtdFileiras.value = configMapaSala?.fileiras || "";
      qtdCarteiras.value = configMapaSala?.carteiras_por_fileira || "";
    }

    async function salvarConfigMapaSala() {
      msgMapa.innerText = "";

      const fileiras = parseInt(qtdFileiras.value, 10);
      const carteiras = parseInt(qtdCarteiras.value, 10);

      if (!fileiras || !carteiras || fileiras < 1 || carteiras < 1) {
        msgMapa.innerText = "Informe quantidades válidas de fileiras e carteiras.";
        return;
      }

      const { error } = await supabase
        .from("turma_mapa_config")
        .upsert([{
          turma_id: turmaAtual.id,
          fileiras: fileiras,
          carteiras_por_fileira: carteiras,
          atualizado_em: new Date().toISOString()
        }], {
          onConflict: "turma_id"
        });

      if (error) {
        console.error("Erro ao salvar configuração do mapa:", error);
        msgMapa.innerText = "Erro ao salvar configuração do mapa: " + error.message;
        return;
      }

      
      msgMapa.innerText = "Configuração do mapa salva com sucesso.";
      await carregarConfigMapaSala();
      await carregarPosicoesMapaSala();
      await preencherMapaSalaAutomaticamente();
      renderizarMapaSalaConfig();

    }

    async function carregarPosicoesMapaSala() {
      const { data, error } = await supabase
        .from("turma_mapa_posicoes")
        .select("turma_id, aluno_id, fileira, carteira")
        .eq("turma_id", turmaAtual.id);

      if (error) {
        console.error("Erro ao carregar posições do mapa:", error);
        msgMapa.innerText = "Erro ao carregar posições do mapa: " + error.message;
        return;
      }

      posicoesMapaSala = data || [];
    }

    async function preencherMapaSalaAutomaticamente() {
      if (!configMapaSala) return;

      const fileiras = configMapaSala.fileiras;
      const carteiras = configMapaSala.carteiras_por_fileira;
      const capacidade = fileiras * carteiras;

      const alunosAtivos = (alunosTurmaAtual || [])
        .filter((aluno) => aluno.transferido !== true)
        .sort((a, b) => a.numero - b.numero);

      if (alunosAtivos.length > capacidade) {
        msgMapa.innerText =
          `O mapa comporta ${capacidade} alunos, mas a turma tem ${alunosAtivos.length} alunos ativos. Aumente fileiras/carteiras.`;
        return;
      }

      const alunosSemPosicao = alunosAtivos.filter((aluno) => !obterPosicaoAluno(aluno.id));
      if (alunosSemPosicao.length === 0) return;

      const ocupadas = new Set(
        (posicoesMapaSala || []).map((p) => `${p.fileira}-${p.carteira}`)
      );

      const livres = [];
      for (let f = 1; f <= fileiras; f++) {
        for (let c = 1; c <= carteiras; c++) {
          const chave = `${f}-${c}`;
          if (!ocupadas.has(chave)) {
            livres.push({ fileira: f, carteira: c });
          }
        }
      }

      const payload = [];
      for (let i = 0; i < alunosSemPosicao.length; i++) {
        const lugar = livres[i];
        if (!lugar) break;

        payload.push({
          turma_id: turmaAtual.id,
          aluno_id: alunosSemPosicao[i].id,
          fileira: lugar.fileira,
          carteira: lugar.carteira,
          atualizado_em: new Date().toISOString()
        });
      }

      if (payload.length === 0) return;

      const { error } = await supabase
        .from("turma_mapa_posicoes")
        .upsert(payload, {
          onConflict: "turma_id,aluno_id"
        });

      if (error) {
        console.error("Erro ao preencher mapa automaticamente:", error);
        msgMapa.innerText = "Erro ao posicionar automaticamente os alunos: " + error.message;
        return;
      }

      await carregarPosicoesMapaSala();
    }

    async function reiniciarMapaSala() {
      msgMapa.innerText = "";

      if (!configMapaSala) {
        msgMapa.innerText = "Salve primeiro a configuração do mapa.";
        return;
      }

      const confirmar = confirm(
        "Deseja reiniciar o mapa e reorganizar os alunos em ordem de chamada?"
      );

      if (!confirmar) return;

      const { error } = await supabase
        .from("turma_mapa_posicoes")
        .delete()
        .eq("turma_id", turmaAtual.id);

      if (error) {
        console.error("Erro ao reiniciar mapa:", error);
        msgMapa.innerText = "Erro ao reiniciar mapa: " + error.message;
        return;
      }

      posicoesMapaSala = [];
      await preencherMapaSalaAutomaticamente();
      await carregarPosicoesMapaSala();
      renderizarMapaSalaConfig();

      msgMapa.innerText = "Mapa reiniciado com sucesso.";
    }

    
    function obterPosicaoAluno(alunoId) {
      return posicoesMapaSala.find((p) => p.aluno_id === alunoId) || null;
    }

    function limparDestaquesMapa() {
      document.querySelectorAll(".carteira-slot.destino-drag").forEach((slot) => {
        slot.classList.remove("destino-drag");
      });
    }

    function criarCardMapaAluno(aluno) {
      const div = document.createElement("div");
      div.className = `card-mapa-aluno ${aluno.transferido ? "transferido" : ""}`;
      div.draggable = true;
      div.dataset.alunoId = aluno.id;

      div.innerHTML = `
        <strong>Nº ${aluno.numero} - ${aluno.nome}</strong><br>
        <span class="muted">RM: ${aluno.rm || "-"}</span>
        ${aluno.transferido ? `<br><span class="muted">Transferido/inativo</span>` : ""}
      `;

      div.addEventListener("dragstart", () => {
        alunoArrastandoId = aluno.id;
      });

      div.addEventListener("dragend", () => {
        alunoArrastandoId = null;
        limparDestaquesMapa();
      });

      return div;
    }

    function configurarDropSlot(slot) {
      slot.addEventListener("dragover", (e) => {
        e.preventDefault();

        if (!alunoArrastandoId) return;

        limparDestaquesMapa();
        slot.classList.add("destino-drag");
      });

      slot.addEventListener("dragleave", () => {
        slot.classList.remove("destino-drag");
      });

      slot.addEventListener("drop", async (e) => {
        e.preventDefault();

        if (!alunoArrastandoId) return;

        const fileira = parseInt(slot.dataset.fileira, 10);
        const carteira = parseInt(slot.dataset.carteira, 10);

        limparDestaquesMapa();
        await moverAlunoNoMapa(alunoArrastandoId, fileira, carteira);
      });
    }

    
    function renderizarMapaSalaConfig() {
      limparDestaquesMapa();
      gradeMapaSala.innerHTML = "";


      if (!configMapaSala) {
        gradeMapaSala.innerHTML = `<div class="muted">Salve primeiro a configuração de fileiras e carteiras.</div>`;
        return;
      }

      const fileiras = configMapaSala.fileiras;
      const carteiras = configMapaSala.carteiras_por_fileira;

      const mapaPosicaoPorChave = {};
      posicoesMapaSala.forEach((p) => {
        mapaPosicaoPorChave[`${p.fileira}-${p.carteira}`] = p.aluno_id;
      });

      for (let f = 1; f <= fileiras; f++) {
        const linha = document.createElement("div");
        linha.className = "fileira-mapa";
        linha.style.gridTemplateColumns = `repeat(${carteiras}, 1fr)`;

        for (let c = 1; c <= carteiras; c++) {
          const slot = document.createElement("div");
          slot.className = "carteira-slot";
          slot.dataset.fileira = String(f);
          slot.dataset.carteira = String(c);

          configurarDropSlot(slot);

          const alunoId = mapaPosicaoPorChave[`${f}-${c}`];
          if (alunoId) {
            const aluno = alunosTurmaAtual.find((a) => a.id === alunoId);
            if (aluno) {
              slot.appendChild(criarCardMapaAluno(aluno));
            }
          }

          linha.appendChild(slot);
        }

        gradeMapaSala.appendChild(linha);
      }
    }

    async function moverAlunoNoMapa(alunoId, novaFileira, novaCarteira) {
      const aluno = alunosTurmaAtual.find((a) => a.id === alunoId);
      if (!aluno) return;

      const posicaoAtual = obterPosicaoAluno(alunoId);
      const ocupante = posicoesMapaSala.find(
        (p) => p.fileira === novaFileira && p.carteira === novaCarteira
      );

      if (
        posicaoAtual &&
        posicaoAtual.fileira === novaFileira &&
        posicaoAtual.carteira === novaCarteira
      ) {
        return;
      }

      if (posicaoAtual) {
        const { error: erroDeleteAtual } = await supabase
          .from("turma_mapa_posicoes")
          .delete()
          .eq("turma_id", turmaAtual.id)
          .eq("aluno_id", alunoId);

        if (erroDeleteAtual) {
          console.error("Erro ao remover posição atual do aluno:", erroDeleteAtual);
          msgMapa.innerText = "Erro ao atualizar posição do aluno.";
          return;
        }
      }

      if (ocupante && ocupante.aluno_id !== alunoId) {
        if (posicaoAtual) {
          const { error: erroMoverOcupante } = await supabase
            .from("turma_mapa_posicoes")
            .upsert([{
              turma_id: turmaAtual.id,
              aluno_id: ocupante.aluno_id,
              fileira: posicaoAtual.fileira,
              carteira: posicaoAtual.carteira,
              atualizado_em: new Date().toISOString()
            }], {
              onConflict: "turma_id,aluno_id"
            });

          if (erroMoverOcupante) {
            console.error("Erro ao mover ocupante:", erroMoverOcupante);
            msgMapa.innerText = "Erro ao mover ocupante.";
            return;
          }
        } else {
          const { error: erroDeleteOcupante } = await supabase
            .from("turma_mapa_posicoes")
            .delete()
            .eq("turma_id", turmaAtual.id)
            .eq("aluno_id", ocupante.aluno_id);

          if (erroDeleteOcupante) {
            console.error("Erro ao remover ocupante:", erroDeleteOcupante);
            msgMapa.innerText = "Erro ao mover ocupante.";
            return;
          }
        }
      }

      const { error } = await supabase
        .from("turma_mapa_posicoes")
        .upsert([{
          turma_id: turmaAtual.id,
          aluno_id: alunoId,
          fileira: novaFileira,
          carteira: novaCarteira,
          atualizado_em: new Date().toISOString()
        }], {
          onConflict: "turma_id,aluno_id"
        });

      if (error) {
        console.error("Erro ao salvar posição do aluno:", error);
        msgMapa.innerText = "Erro ao salvar posição do aluno: " + error.message;
        return;
      }

      const deFileira = posicaoAtual?.fileira ?? null;
      const deCarteira = posicaoAtual?.carteira ?? null;

      const { error: erroHist } = await supabase
        .from("turma_mapa_historico")
        .insert([{
          turma_id: turmaAtual.id,
          aluno_id: aluno.id,
          aluno_nome: aluno.nome,
          de_fileira: deFileira,
          de_carteira: deCarteira,
          para_fileira: novaFileira,
          para_carteira: novaCarteira,
          professor_id: usuarioAtual.id,
          professor_nome: professorAtual.nome
        }]);

      if (erroHist) {
        console.error("Erro ao gravar histórico do mapa:", erroHist);
      }

      await carregarPosicoesMapaSala();
      await carregarHistoricoMapaSala();
      renderizarMapaSalaConfig();
    }

    async function removerAlunoDoMapa(alunoId) {
      const aluno = alunosTurmaAtual.find((a) => a.id === alunoId);
      const posicaoAtual = obterPosicaoAluno(alunoId);

      if (!aluno || !posicaoAtual) return;

      const { error } = await supabase
        .from("turma_mapa_posicoes")
        .delete()
        .eq("turma_id", turmaAtual.id)
        .eq("aluno_id", alunoId);

      if (error) {
        console.error("Erro ao remover aluno do mapa:", error);
        msgMapa.innerText = "Erro ao remover aluno do mapa: " + error.message;
        return;
      }

      const { error: erroHist } = await supabase
        .from("turma_mapa_historico")
        .insert([{
          turma_id: turmaAtual.id,
          aluno_id: aluno.id,
          aluno_nome: aluno.nome,
          de_fileira: posicaoAtual.fileira,
          de_carteira: posicaoAtual.carteira,
          para_fileira: null,
          para_carteira: null,
          professor_id: usuarioAtual.id,
          professor_nome: professorAtual.nome
        }]);

      if (erroHist) {
        console.error("Erro ao gravar histórico do mapa:", erroHist);
      }

      await carregarPosicoesMapaSala();
      await carregarHistoricoMapaSala();
      renderizarMapaSalaConfig();
    }

    async function carregarHistoricoMapaSala() {
      const { data, error } = await supabase
        .from("turma_mapa_historico")
        .select("aluno_nome, de_fileira, de_carteira, para_fileira, para_carteira, professor_nome, criado_em")
        .eq("turma_id", turmaAtual.id)
        .order("criado_em", { ascending: false })
        .limit(10);

      if (error) {
        console.error("Erro ao carregar histórico do mapa:", error);
        listaHistoricoMapa.innerHTML = `<div class="mensagem">Erro ao carregar histórico: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        listaHistoricoMapa.innerHTML = `<div class="muted">Nenhuma alteração registrada ainda.</div>`;
        return;
      }

      listaHistoricoMapa.innerHTML = "";
      data.forEach((item) => {
        const div = document.createElement("div");
        div.className = "item-historico-mapa";

        const origem = item.de_fileira && item.de_carteira
          ? `fileira ${item.de_fileira}, carteira ${item.de_carteira}`
          : "sem posição";

        const destino = item.para_fileira && item.para_carteira
          ? `fileira ${item.para_fileira}, carteira ${item.para_carteira}`
          : "sem posição";

        div.innerHTML = `
          <strong>${item.aluno_nome}</strong><br>
          <span class="muted">${origem} → ${destino}</span><br>
          <span class="muted">Por ${item.professor_nome} em ${new Date(item.criado_em).toLocaleString("pt-BR")}</span>
        `;

        listaHistoricoMapa.appendChild(div);
      });
    }

    async function salvarAluno() {
      msgAluno.innerText = "";

      const numero = parseInt(numeroAluno.value, 10);
      const nome = nomeAluno.value.trim();
      const rm = rmAluno.value.trim();

      if (!numero || !nome) {
        msgAluno.innerText = "Preencha pelo menos número e nome do aluno.";
        return;
      }

      const { error } = await supabase
        .from("alunos")
        .insert([
          {
            turma_id: turmaAtual.id,
            numero: numero,
            nome: nome,
            rm: rm || null,
            transferido: false
          }

        ]);

      if (error) {
        console.error(error);

        return;
      }

      msgAluno.innerText = "Aluno cadastrado com sucesso!";

      await carregarAlunos();
      await carregarConfigMapaSala();
      await carregarPosicoesMapaSala();
      await preencherMapaSalaAutomaticamente();
      await carregarHistoricoMapaSala();
      renderizarMapaSalaConfig();
    }

    function normalizarCabecalho(valor) {
      return String(valor || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^\w]/g, "")
        .toLowerCase()
        .trim();
    }

    function detectarTransferidoPorLancamento(valor) {
      const texto = String(valor || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toUpperCase()
        .trim();

      if (!texto) return false;

      // Remove espaços e separadores para casos como "I I", "I/I", "I - I"
      const compacto = texto.replace(/[\s|/\\,;.-]+/g, "");

      return compacto.includes("I");
    }

    function encontrarIndiceColuna(headers, candidatos) {
      const normalizados = headers.map(h => normalizarCabecalho(h));

      for (const candidato of candidatos) {
        const idx = normalizados.indexOf(normalizarCabecalho(candidato));
        if (idx !== -1) return idx;
      }

      return -1;
    }

    function encontrarIndiceLancamento(headers) {
      const normalizados = headers.map(h => normalizarCabecalho(h));

      // Tentativas diretas
      let idx = normalizados.indexOf("lancamento");
      if (idx !== -1) return idx;

      idx = normalizados.indexOf("lansamento");
      if (idx !== -1) return idx;

      // Tentativa aproximada: qualquer cabeçalho que comece com "lan" e contenha "amento"
      idx = normalizados.findIndex(h => h.startsWith("lan") && h.includes("amento"));
      if (idx !== -1) return idx;

      // Fallback seguro para este modelo de planilha:
      // Nº | Aluno | RM | Lançamento | Justificativa
      if (headers.length >= 4) return 3;

      return -1;
    }

    function getLinhasPrincipaisDaTabela(table) {
      const linhas = [];

      for (const filho of Array.from(table.children)) {
        const tag = filho.tagName?.toUpperCase();

        if (tag === "THEAD" || tag === "TBODY" || tag === "TFOOT") {
          for (const tr of Array.from(filho.children)) {
            if (tr.tagName?.toUpperCase() === "TR") {
              linhas.push(tr);
            }
          }
        } else if (tag === "TR") {
          linhas.push(filho);
        }
      }

      return linhas;
    }

    function extrairAlunosDeHtmlXls(textoHtml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(textoHtml, "text/html");

      const tabela = doc.querySelector("table");
      if (!tabela) {
        throw new Error("Não encontrei uma tabela HTML no arquivo .xls.");
      }

      const linhas = getLinhasPrincipaisDaTabela(tabela);
      if (!linhas || linhas.length === 0) {
        throw new Error("A tabela HTML está vazia.");
      }

      const primeiraLinha = linhas[0];
      const headers = Array.from(primeiraLinha.children).map(cel =>
        (cel.textContent || "").replace(/\s+/g, " ").trim()
      );

      let idxNumero = encontrarIndiceColuna(headers, ["Nº", "N°", "N", "No", "Numero"]);
      let idxAluno = encontrarIndiceColuna(headers, ["Aluno", "Nome", "Nome do aluno"]);
      let idxRm = encontrarIndiceColuna(headers, ["RM", "Rm", "Registro"]);
      let idxLancamento = encontrarIndiceLancamento(headers);

      console.log("Headers HTML:", headers);
      console.log("Headers HTML normalizados:", headers.map(normalizarCabecalho));
      console.log("idxLancamento HTML:", idxLancamento);

      if (idxNumero === -1 || idxAluno === -1 || idxRm === -1) {
        throw new Error("Não consegui identificar as colunas Nº, Aluno e RM no HTML.");
      }

      const mapaAlunos = new Map();

      for (let i = 1; i < linhas.length; i++) {
        const row = linhas[i];
        const celulas = Array.from(row.children);

        if (celulas.length < 3) continue;

        const numeroTexto = (celulas[idxNumero]?.textContent || "").replace(/\s+/g, " ").trim();
        const nomeTexto = (celulas[idxAluno]?.textContent || "").replace(/\s+/g, " ").trim();
        const rmTexto = (celulas[idxRm]?.textContent || "").replace(/\s+/g, " ").trim();
        const lancamentoTexto =
          idxLancamento >= 0
            ? String(celulas[idxLancamento]?.textContent || "").replace(/\s+/g, " ").trim()
            : "";

        const numero = parseInt(String(numeroTexto).replace(/[^\d]/g, ""), 10);
        const nome = String(nomeTexto || "").trim();
        const rm = String(rmTexto || "").trim();

        if (!numero || !nome) continue;

        mapaAlunos.set(numero, {
          numero,
          nome,
          rm: rm || null,
          transferido: detectarTransferidoPorLancamento(lancamentoTexto)
        });
      }

      const alunos = Array.from(mapaAlunos.values()).sort((a, b) => a.numero - b.numero);

      if (alunos.length === 0) {
        throw new Error("Nenhum aluno válido foi encontrado no HTML do .xls.");
      }

      return alunos;
    }

    function textoCelula(ws, r, c) {
      const endereco = XLSX.utils.encode_cell({ r, c });
      const celula = ws[endereco];

      if (!celula) return "";

      return String(celula.w ?? celula.v ?? "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function linhaPareceCabecalho(celulasNormalizadas) {
      const temNumero = celulasNormalizadas.some(v =>
        ["n", "no", "numero"].includes(v)
      );

      const temAluno = celulasNormalizadas.some(v =>
        ["aluno", "nome", "nomedoaluno"].includes(v)
      );

      const temRm = celulasNormalizadas.some(v =>
        ["rm", "registro"].includes(v)
      );

      return temNumero && temAluno && temRm;
    }

    function extrairAlunosViaSheetJS(workbook) {
      const nomePrimeiraAba = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[nomePrimeiraAba];

      if (!worksheet || !worksheet["!ref"]) {
        throw new Error("Não foi possível ler a primeira aba da planilha.");
      }

      const range = XLSX.utils.decode_range(worksheet["!ref"]);

      let linhaCabecalho = -1;
      let headers = [];

      for (let r = range.s.r; r <= Math.min(range.e.r, range.s.r + 20); r++) {
        const linha = [];

        for (let c = range.s.c; c <= range.e.c; c++) {
          linha.push(textoCelula(worksheet, r, c));
        }

        const normalizados = linha.map(normalizarCabecalho);

        if (linhaPareceCabecalho(normalizados)) {
          linhaCabecalho = r;
          headers = linha;
          break;
        }
      }

      if (linhaCabecalho === -1) {
        throw new Error("Não encontrei a linha de cabeçalho com Nº, Aluno e RM.");
      }

      let idxNumero = encontrarIndiceColuna(headers, ["Nº", "N°", "N", "No", "Numero"]);
      let idxAluno = encontrarIndiceColuna(headers, ["Aluno", "Nome", "Nome do aluno"]);
      let idxRm = encontrarIndiceColuna(headers, ["RM", "Rm", "Registro"]);
      let idxLancamento = encontrarIndiceLancamento(headers);

      if (idxNumero === -1 || idxAluno === -1 || idxRm === -1) {
        throw new Error("Não consegui identificar corretamente as colunas Nº, Aluno e RM.");
      }

      const mapaAlunos = new Map();
      let linhasVaziasSeguidas = 0;

      for (let r = linhaCabecalho + 1; r <= range.e.r; r++) {
        const numeroTexto = textoCelula(worksheet, r, idxNumero);
        const nomeTexto = textoCelula(worksheet, r, idxAluno);
        const rmTexto = textoCelula(worksheet, r, idxRm);
        const lancamentoTexto = idxLancamento >= 0 ? textoCelula(worksheet, r, idxLancamento) : "";

        if (!numeroTexto && !nomeTexto && !rmTexto) {
          linhasVaziasSeguidas++;
          if (linhasVaziasSeguidas >= 5) break;
          continue;
        }

        linhasVaziasSeguidas = 0;

        const numero = parseInt(String(numeroTexto).replace(/[^\d]/g, ""), 10);
        const nome = String(nomeTexto || "").trim();
        const rm = String(rmTexto || "").trim();

        if (!numero || !nome) continue;

        mapaAlunos.set(numero, {
          numero,
          nome,
          rm: rm || null,
          transferido: detectarTransferidoPorLancamento(lancamentoTexto)
        });
      }

      const alunos = Array.from(mapaAlunos.values()).sort((a, b) => a.numero - b.numero);

      if (alunos.length === 0) {
        throw new Error("Nenhum aluno válido foi encontrado na planilha.");
      }

      return alunos;
    }

    async function importarPlanilha() {
      msgImportacao.innerText = "";

      const arquivo = arquivoPlanilha.files[0];

      if (!arquivo) {
        msgImportacao.innerText = "Selecione um arquivo .xls ou .xlsx.";
        return;
      }

      try {
        msgImportacao.innerText = "Lendo planilha...";

        let alunosExtraidos = [];
        const nomeArquivo = (arquivo.name || "").toLowerCase();

        if (nomeArquivo.endsWith(".xls")) {
          try {
            const texto = await arquivo.text();
            alunosExtraidos = extrairAlunosDeHtmlXls(texto);
            console.log("Importação via HTML .xls:", alunosExtraidos);
          } catch (erroHtml) {
            console.warn("Falha na leitura HTML do .xls, tentando via SheetJS...", erroHtml);

            const arrayBuffer = await arquivo.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, {
              type: "array",
              raw: false,
              cellText: true,
              cellDates: true
            });

            alunosExtraidos = extrairAlunosViaSheetJS(workbook);
            console.log("Importação via SheetJS:", alunosExtraidos);
          }
        } else {
          const arrayBuffer = await arquivo.arrayBuffer();
          const workbook = XLSX.read(arrayBuffer, {
            type: "array",
            raw: false,
            cellText: true,
            cellDates: true
          });

          alunosExtraidos = extrairAlunosViaSheetJS(workbook);
          console.log("Importação via SheetJS:", alunosExtraidos);
        }

        msgImportacao.innerText = `Planilha lida com sucesso. Importando ${alunosExtraidos.length} alunos...`;

        const payload = alunosExtraidos.map((aluno) => ({
          turma_id: turmaAtual.id,
          numero: aluno.numero,
          nome: aluno.nome,
          rm: aluno.rm,
          transferido: aluno.transferido === true
        }));

        const { error } = await supabase
          .from("alunos")
          .upsert(payload, {
            onConflict: "turma_id,numero"
          });

        if (error) {
          console.error("Erro ao importar alunos:", error);
          msgImportacao.innerText = "Erro ao importar planilha: " + error.message;
          return;
        }

        const numerosImportados = alunosExtraidos.map((aluno) => aluno.numero);

        if (numerosImportados.length > 0) {
          const { error: erroTransferidos } = await supabase
            .from("alunos")
            .update({ transferido: true })
            .eq("turma_id", turmaAtual.id)
            .not("numero", "in", `(${numerosImportados.join(",")})`);

          if (erroTransferidos) {
            console.error("Erro ao marcar alunos ausentes como transferidos:", erroTransferidos);
            msgImportacao.innerText =
              "Planilha importada, mas houve erro ao marcar transferidos: " + erroTransferidos.message;
            return;
          }
        }

        msgImportacao.innerText = `Importação concluída com sucesso! ${payload.length} alunos processados.`;
        arquivoPlanilha.value = "";

        await carregarAlunos();
        await carregarConfigMapaSala();
        await carregarPosicoesMapaSala();
        await preencherMapaSalaAutomaticamente();
        await carregarHistoricoMapaSala();
        renderizarMapaSalaConfig();
      } catch (e) {
        console.error("Erro na leitura/importação:", e);
        msgImportacao.innerText = "Erro ao processar a planilha: " + e.message;
      }
    }
